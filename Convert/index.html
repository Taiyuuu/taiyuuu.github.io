<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="icon.ico" type="image/x-icon">
    <title>Converter</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            --highlight-color: #1C77FF;
        }

        #file-input {
            display: none;
        }

        #file-area {
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
            height: 30vh;
            background-color: var(--highlight-color);
            color: #fff;
            text-align: center;
            cursor: pointer;
        }

        #file-area h2,
        #file-area p {
            margin: 5px;
        }

        #side-panel {
            position: absolute;
            top: 0;
            right: 0;
            width: 20em;
            height: 30vh;
            padding: 2em;
            box-sizing: border-box;
            pointer-events: none;
        }

        #side-panel button {
            font-size: 1rem;
            width: 100%;
            padding: 10px 20px;
            border: 0;
            border-radius: 10px;
            background-color: #fff;
            color: var(--highlight-color);
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px #a9a9a966;
            pointer-events: all;
        }

        #side-panel button:active {
            transform: translateY(5px);
            box-shadow: 0 0;
        }

        #format-containers {
            display: flex;
        }

        .format-container {
            display: flex;
            flex-flow: column nowrap;
            align-items: center;
            width: 50vw;
            min-height: 70vh;
            padding: .8em 7em;
        }

        .format-container h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        #from-container {
            background-color: #d3d3d3;
        }

        #to-container {
            background-color: #b8b8b8;
        }

        .search {
            text-align: center;
            margin-bottom: 30px;
            padding: 10px 20px;
            border: 0;
            border-radius: 5px;
            outline: none;
            box-shadow: 0 5px #a9a9a9;
        }

        .format-list {
            display: flex;
            flex-flow: column nowrap;
            width: 100%;
            align-items: center;
            background-color: #fff;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 5vw;
        }

        .format-list button {
            width: 80%;
            margin: 5px 0;
            padding: 10px;
            color: #000;
            background-color: #d3d3d3;
            border: 0;
            border-radius: 10px;
            font-family: monospace;
            word-break: break-word;
            cursor: pointer;
        }

        button.selected {
            background-color: var(--highlight-color);
            color: #fff;
            font-weight: 700;
        }

        #convert-button {
            position: fixed;
            left: 50%;
            bottom: 5%;
            transform: translate(-50%);
            font-size: 1.5rem;
            padding: 10px 20px;
            border: 0;
            border-radius: 10px;
            background-color: var(--highlight-color);
            color: #fff;
            cursor: pointer;
        }

        .disabled {
            filter: grayscale(1);
            pointer-events: none;
        }

        #popup-bg {
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: #00000080;
        }

        #popup {
            position: fixed;
            left: 50%;
            top: 50%;
            width: 20vw;
            transform: translate(-50%, -50%);
            background-color: #fff;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        #popup button {
            font-size: 1rem;
            padding: 7px 20px;
            border: 0;
            border-radius: 10px;
            background-color: #d3d3d3;
            color: #000;
            cursor: pointer;
        }

        /* Media Queries */
        @media only screen and (max-width: 800px) {
            #drop-hint-text {
                display: none;
            }

            .format-container {
                width: 100%;
                box-sizing: border-box;
                padding: .8em 4em;
            }

            .format-list button {
                width: 100%;
            }

            #format-containers {
                flex-flow: column nowrap;
            }

            #popup {
                width: 80vw;
            }

            #side-panel {
                width: 50%;
                padding: .8em;
                text-align: right;
            }

            #side-panel button {
                font-size: .8rem;
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- Hidden File Input -->
    <input type="file" id="file-input" accept="image/*">

    <!-- Main Drop Area -->
    <div id="file-area">
        <h2>Click or Drop File Here</h2>
        <p id="file-name"></p>
    </div>

    <!-- Side Panel (Reset) -->
    <div id="side-panel">
        <button id="home-button" style="display: none; margin-bottom: 10px;">Home</button>
        <button id="settings-btn" style="margin-bottom: 10px;">Settings</button>
        <button id="html-dir-btn" style="margin-bottom: 10px;">HTML</button>
        <button id="multi-file-btn" style="display: none; margin-bottom: 10px;">Multiple Files</button>
        <button id="reset-button">Reset</button>
    </div>

    <!-- Intro Action -->
    <div id="intro-container" style="display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 50px;">
        <button id="show-formats-btn" style="font-size: 1.5rem; padding: 10px 20px; border: 0; border-radius: 10px; background-color: var(--highlight-color); color: #fff; cursor: pointer; width: 250px;">Convert Images</button>
        <button id="show-video-formats-btn" style="font-size: 1.5rem; padding: 10px 20px; border: 0; border-radius: 10px; background-color: var(--highlight-color); color: #fff; cursor: pointer; width: 250px;">Convert Videos</button>
        <button id="show-audio-formats-btn" style="font-size: 1.5rem; padding: 10px 20px; border: 0; border-radius: 10px; background-color: var(--highlight-color); color: #fff; cursor: pointer; width: 250px;">Convert Audios</button>
        <button id="show-img-to-vid-btn" style="font-size: 1.5rem; padding: 10px 20px; border: 0; border-radius: 10px; background-color: var(--highlight-color); color: #fff; cursor: pointer; width: 250px;">Images to Video</button>
        <button id="show-vid-to-img-btn" style="font-size: 1.5rem; padding: 10px 20px; border: 0; border-radius: 10px; background-color: var(--highlight-color); color: #fff; cursor: pointer; width: 250px;">Video to Images</button>
        <button id="show-vid-to-aud-btn" style="font-size: 1.5rem; padding: 10px 20px; border: 0; border-radius: 10px; background-color: var(--highlight-color); color: #fff; cursor: pointer; width: 250px;">Video to Audio</button>
        <button id="show-aud-to-img-btn" style="font-size: 1.5rem; padding: 10px 20px; border: 0; border-radius: 10px; background-color: var(--highlight-color); color: #fff; cursor: pointer; width: 250px;">Audio to Image</button>
        <button id="show-img-to-aud-btn" style="font-size: 1.5rem; padding: 10px 20px; border: 0; border-radius: 10px; background-color: var(--highlight-color); color: #fff; cursor: pointer; width: 250px;">Image to Audio</button>
    </div>

    <!-- Format Selection Columns -->
    <div id="format-containers" style="display: none;">
        <div class="format-container" id="from-container">
            <h2>From</h2>
            <input type="text" class="search" placeholder="Search format...">
            <div class="format-list" id="from-list"></div>
        </div>
        <div class="format-container" id="to-container">
            <h2>To</h2>
            <input type="text" class="search" placeholder="Search format...">
            <div class="format-list" id="to-list"></div>
        </div>
    </div>

    <!-- Settings Container -->
    <div id="settings-container" style="display: none; position: fixed; top: 50%; left: 20px; transform: translateY(-50%); background-color: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 1000; text-align: center; min-width: 300px;">
        <h2>Settings</h2>
        <div style="margin: 20px;">
            <label for="svg-scale-input" style="font-size: 1.2rem;">SVG Scale Factor: </label>
            <input type="number" id="svg-scale-input" value="10" min="1" max="100" step="1" style="padding: 5px; width: 60px; font-size: 1rem;">
        </div>
        <div style="margin: 20px;">
            <p style="font-size: 1.2rem; margin-bottom: 10px;">Audio Visualization:</p>
            <label style="margin-right: 10px;"><input type="radio" name="audio-vis" value="spectrogram" checked id="vis-spectrogram"> Spectrogram</label>
            <label><input type="radio" name="audio-vis" value="waveform" id="vis-waveform"> Waveform</label>
        </div>
        <div style="margin: 20px;">
            <p style="font-size: 1.2rem; margin-bottom: 10px;">Download Directory:</p>
            <button id="set-dir-btn" style="font-size: 1rem; padding: 5px 10px;">Select Folder</button>
            <p id="dir-status" style="margin-top: 5px; font-size: 0.9rem; color: #666;">Default (Browser Downloads)</p>
        </div>
        <button id="close-settings-btn" style="font-size: 1rem; padding: 10px 20px; border: 0; border-radius: 10px; background-color: #d3d3d3; cursor: pointer;">Close</button>
    </div>

    <!-- Video to Image Settings -->
    <div id="vid-to-img-settings" style="display: none; text-align: center; margin-top: 20px;">
        <button id="single-frame-btn" style="font-size: 1rem; padding: 10px 20px; border: 0; border-radius: 10px; background-color: var(--highlight-color); color: #fff; cursor: pointer; margin-right: 10px;">Choose Single Frame</button>
        <button id="every-frame-btn" style="font-size: 1rem; padding: 10px 20px; border: 0; border-radius: 10px; background-color: #d3d3d3; color: #000; cursor: pointer;">Convert Every Frame</button>
        <div id="single-frame-preview" style="display: none; margin-top: 15px;">
            <p>Seek to the frame you want to capture:</p>
        <div style="margin: 10px 0;">
            <label for="preview-size">Preview Size: </label>
            <input type="range" id="preview-size" min="10" max="100" value="100" style="vertical-align: middle;">
        </div>
            <video id="video-preview" controls style="max-width: 100%; max-height: 1000px; margin-top: 10px;"></video>
        </div>
    </div>

    <!-- Images to Video Settings -->
    <div id="img-to-vid-settings" style="display: none; text-align: center; margin-top: 20px;">
        <h3>Video Settings</h3>
        <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; align-items: center; flex-wrap: wrap;">
            <div>
                <label for="fps-input">FPS: </label>
                <input type="number" id="fps-input" value="24" min="1" max="60" step="1" style="width: 60px;">
            </div>
            <div>
                <label for="time-per-frame-input">Time/Frame (s): </label>
                <input type="number" id="time-per-frame-input" value="0.0417" step="0.0001" style="width: 80px;">
            </div>
            <div>
                <label for="total-time-input">Total Time (s): </label>
                <input type="number" id="total-time-input" readonly style="width: 80px;">
            </div>
        </div>
        <div id="image-preview-container" style="display: none; margin-top: 15px;">
            <img id="image-preview" style="max-width: 100%; max-height: 500px; margin-top: 10px; border: 1px solid #ccc; background-color: #f0f0f0; min-height: 200px;">
        </div>
    </div>

    <!-- Convert Action -->
    <button id="convert-button" class="disabled" style="display: none;">Convert Now</button>

    <!-- Popup Modal -->
    <div id="popup-bg" style="display: none;"></div>
    <div id="popup" style="display: none;"></div>

    <script src="coi-serviceworker.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
