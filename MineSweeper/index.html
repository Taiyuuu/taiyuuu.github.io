    function runAIStep() {
        if (gameOver || gameMode !== 'standard') return;

        // Check if board is empty
        let hasRevealed = false;
        for(let r=0; r<config.rows; r++) {
            for(let c=0; c<config.cols; c++) {
                if(grid[r][c] && grid[r][c].revealed) {
                    hasRevealed = true;
                    break;
                }
            }
            if(hasRevealed) break;
        }

        if (!hasRevealed) {
            const r = Math.floor(config.rows / 2);
            const c = Math.floor(config.cols / 2);
            if (grid[r][c]) clickTile(r, c);
            return;
        }

        // 1. Flagging Step
        for (let r = 0; r < config.rows; r++) {
            for (let c = 0; c < config.cols; c++) {
                let tile = grid[r][c];
                if (!tile || !tile.revealed || tile.neighborMines === 0) continue;

                let unrevealed = [];
                let flags = 0;
                
                traverseNeighbors(r, c, (nr, nc) => {
                    let n = grid[nr][nc];
                    if (n.flagged === 1) flags++;
                    else if (!n.revealed) unrevealed.push(n);
                });

                if (unrevealed.length > 0 && unrevealed.length === tile.neighborMines - flags) {
                    let target = unrevealed[0];
                    if (target.flagged !== 1) {
                        rightClickTile(target.r, target.c);
                        return; 
                    }
                }
            }
        }

        // 2. Revealing Step
        for (let r = 0; r < config.rows; r++) {
            for (let c = 0; c < config.cols; c++) {
                let tile = grid[r][c];
                if (!tile || !tile.revealed || tile.neighborMines === 0) continue;

                let flags = 0;
                let hasUnrevealed = false;
                
                traverseNeighbors(r, c, (nr, nc) => {
                    let n = grid[nr][nc];
                    if (n.flagged === 1) flags++;
                    else if (!n.revealed) hasUnrevealed = true;
                });

                if (hasUnrevealed && flags === tile.neighborMines) {
                    triggerChord(r, c);
                    return;
                }
            }
        }

        // 3. Advanced Pattern Step (Subset Rule & 1-2 Pattern)
        let activeTiles = [];
        for(let r=0; r<config.rows; r++) {
            for(let c=0; c<config.cols; c++) {
                let t = grid[r][c];
                if(t && t.revealed && t.neighborMines > 0) {
                    let unrevealed = [];
                    let flags = 0;
                    traverseNeighbors(r, c, (nr, nc) => {
                        let n = grid[nr][nc];
                        if(n.flagged === 1) flags++;
                        else if(!n.revealed) unrevealed.push(n);
                    });
                    
                    if(unrevealed.length > 0) {
                        activeTiles.push({
                            r: r, c: c,
                            eff: t.neighborMines - flags,
                            unrevealed: unrevealed
                        });
                    }
                }
            }
        }

        for(let i=0; i<activeTiles.length; i++) {
            let A = activeTiles[i];
            for(let j=i+1; j<activeTiles.length; j++) {
                let B = activeTiles[j];
                
                if(Math.abs(A.r - B.r) > 1 || Math.abs(A.c - B.c) > 1) continue;

                let U_A = A.unrevealed.filter(a => !B.unrevealed.includes(a));
                let U_B = B.unrevealed.filter(b => !A.unrevealed.includes(b));
                
                let diff = A.eff - B.eff;
                
                if (diff === U_A.length) {
                    let acted = false;
                    U_A.forEach(n => {
                                if(n.flagged !== 1) {
                                    rightClickTile(n.r, n.c);
                                    acted = true;
                                }
                            });
                    U_B.forEach(n => {
                                if(!n.revealed && n.flagged !== 1) {
                                    clickTile(n.r, n.c);
                                    acted = true;
                                }
                            });
                    if (acted) return;
                }
                
                if (-diff === U_B.length) {
                    let acted = false;
                    U_B.forEach(n => {
                        if(n.flagged !== 1) {
                            rightClickTile(n.r, n.c);
                            acted = true;
                        }
                    });
                    U_A.forEach(n => {
                        if(!n.revealed && n.flagged !== 1) {
                            clickTile(n.r, n.c);
                            acted = true;
                        }
                    });
                    if (acted) return;
                }
            }
        }
    }

    function showHint() {
        if (gameOver) return;
        
        if (pendingHint) {
            pendingHint.forEach(h => {
                if (h.type === 'flag') {
                    if (grid[h.r][h.c].flagged !== 1) rightClickTile(h.r, h.c);
                } else if (h.type === 'reveal') {
                    if (!grid[h.r][h.c].revealed && grid[h.r][h.c].flagged !== 1) clickTile(h.r, h.c);
                }
            });
            pendingHint = null;
            clearHints();
            return;
        }

        clearHints();

        // 1. Flagging Step (Guaranteed Mines)
        for (let r = 0; r < config.rows; r++) {
            for (let c = 0; c < config.cols; c++) {
                let tile = grid[r][c];
                if (!tile || !tile.revealed || tile.neighborMines === 0) continue;

                let unrevealed = [];
                let flags = 0;
                
                traverseNeighbors(r, c, (nr, nc) => {
                    let n = grid[nr][nc];
                    if (n.flagged === 1) flags++;
                    else if (!n.revealed) unrevealed.push(n);
                });

                if (unrevealed.length > 0 && unrevealed.length === tile.neighborMines - flags) {
                    let target = unrevealed[0];
                    if (target.flagged !== 1) {
                        target.el.classList.add('hint-mine');
                        pendingHint = [{r: target.r, c: target.c, type: 'flag'}];
                        setTimeout(() => { 
                            target.el.classList.remove('hint-mine'); 
                            pendingHint = null;
                        }, 2000);
                        return; 
                    }
                }
            }
        }

        // 2. Revealing Step (Guaranteed Safe)
        for (let r = 0; r < config.rows; r++) {
            for (let c = 0; c < config.cols; c++) {
                let tile = grid[r][c];
                if (!tile || !tile.revealed || tile.neighborMines === 0) continue;

                let flags = 0;
                let unrevealed = [];
                
                traverseNeighbors(r, c, (nr, nc) => {
                    let n = grid[nr][nc];
                    if (n.flagged === 1) flags++;
                    else if (!n.revealed) unrevealed.push(n);
                });

                if (unrevealed.length > 0 && flags === tile.neighborMines) {
                    let target = unrevealed[0];
                    target.el.classList.add('hint-safe');
                    pendingHint = [{r: target.r, c: target.c, type: 'reveal'}];
                    setTimeout(() => { 
                        target.el.classList.remove('hint-safe'); 
                        pendingHint = null;
                    }, 2000);
                    return;
                }
            }
        }

        // 3. Advanced Pattern Step (Subset Rule & 1-2 Pattern)
        let activeTiles = [];
        for(let r=0; r<config.rows; r++) {
            for(let c=0; c<config.cols; c++) {
                let t = grid[r][c];
                if(t && t.revealed && t.neighborMines > 0) {
                    let unrevealed = [];
                    let flags = 0;
                    traverseNeighbors(r, c, (nr, nc) => {
                        let n = grid[nr][nc];
                        if(n.flagged === 1) flags++;
                        else if(!n.revealed) unrevealed.push(n);
                    });
                    
                    if(unrevealed.length > 0) {
                        activeTiles.push({
                            r: r, c: c,
                            eff: t.neighborMines - flags,
                            unrevealed: unrevealed
                        });
                    }
                }
            }
        }

        for(let i=0; i<activeTiles.length; i++) {
            let A = activeTiles[i];
            for(let j=i+1; j<activeTiles.length; j++) {
                let B = activeTiles[j];
                
                if(Math.abs(A.r - B.r) > 1 || Math.abs(A.c - B.c) > 1) continue;

                let U_A = A.unrevealed.filter(a => !B.unrevealed.includes(a));
                let U_B = B.unrevealed.filter(b => !A.unrevealed.includes(b));
                
                let diff = A.eff - B.eff;
                
                if (diff === U_A.length) {
                    let hints = [];
                    for(let n of U_A) {
                        if(n.flagged !== 1) {
                            n.el.classList.add('hint-mine');
                            hints.push({r: n.r, c: n.c, type: 'flag'});
                        }
                    }
                    for(let n of U_B) {
                        if(!n.revealed && n.flagged !== 1) {
                            n.el.classList.add('hint-safe');
                            hints.push({r: n.r, c: n.c, type: 'reveal'});
                        }
                    }
                    if (hints.length > 0) {
                        pendingHint = hints;
                        setTimeout(() => {
                            hints.forEach(h => {
                                if(grid[h.r][h.c]) {
                                    grid[h.r][h.c].el.classList.remove('hint-mine');
                                    grid[h.r][h.c].el.classList.remove('hint-safe');
                                }
                            });
                            pendingHint = null;
                        }, 2000);
                        return;
                    }
                }
                
                if (-diff === U_B.length) {
                    let hints = [];
                    for(let n of U_B) {
                        if(n.flagged !== 1) {
                            n.el.classList.add('hint-mine');
                            hints.push({r: n.r, c: n.c, type: 'flag'});
                        }
                    }
                    for(let n of U_A) {
                        if(!n.revealed && n.flagged !== 1) {
                            n.el.classList.add('hint-safe');
                            hints.push({r: n.r, c: n.c, type: 'reveal'});
                        }
                    }
                    if (hints.length > 0) {
                        pendingHint = hints;
                        setTimeout(() => {
                            hints.forEach(h => {
                                if(grid[h.r][h.c]) {
                                    grid[h.r][h.c].el.classList.remove('hint-mine');
                                    grid[h.r][h.c].el.classList.remove('hint-safe');
                                }
                            });
                            pendingHint = null;
                        }, 2000);
                        return;
                    }
                }
            }
        }

        // Fallback for start of game
        let hasRevealed = false;
        for(let r=0; r<config.rows; r++) {
            for(let c=0; c<config.cols; c++) {
                if(grid[r][c] && grid[r][c].revealed) {
                    hasRevealed = true;
                    break;
                }
            }
            if(hasRevealed) break;
        }
        if (!hasRevealed) {
             const r = Math.floor(config.rows / 2);
             const c = Math.floor(config.cols / 2);
             if (grid[r][c]) {
                 grid[r][c].el.classList.add('hint-safe');
                 pendingHint = [{r, c, type: 'reveal'}];
                 setTimeout(() => { 
                     grid[r][c].el.classList.remove('hint-safe'); 
                     pendingHint = null;
                 }, 2000);
             }
        }
    }

    function clearHints() {
        document.querySelectorAll('.hint-safe, .hint-mine').forEach(el => {
            el.classList.remove('hint-safe');
            el.classList.remove('hint-mine');
        });
    }

    function analyzeBoard() {
        if (gameMode !== 'standard') return alert("Analysis only available in standard modes.");
        if (gameOver) return alert("Game is over.");
        if (!minesPlaced) return alert("Make a move first.");

        // Create simulation grid
        let simGrid = [];
        for(let r=0; r<config.rows; r++) {
            simGrid[r] = [];
            for(let c=0; c<config.cols; c++) {
                let realTile = grid[r][c];
                simGrid[r][c] = {
                    r: r, c: c,
                    isMine: realTile.isMine,
                    neighborMines: realTile.neighborMines,
                    revealed: realTile.revealed,
                    flagged: realTile.flagged
                };
            }
        }

        const getNeighbors = (r, c) => {
            let neighbors = [];
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    if (dr === 0 && dc === 0) continue;
                    let nr = r + dr, nc = c + dc;
                    if (nr >= 0 && nr < config.rows && nc >= 0 && nc < config.cols) {
                        neighbors.push(simGrid[nr][nc]);
                    }
                }
            }
            return neighbors;
        };

        const simReveal = (tile) => {
            if (tile.revealed || tile.flagged === 1) return false;
            tile.revealed = true;
            let changed = true;
            
            if (tile.neighborMines === 0 && !tile.isMine) {
                let queue = [tile];
                while(queue.length > 0) {
                    let curr = queue.shift();
                    let ns = getNeighbors(curr.r, curr.c);
                    ns.forEach(n => {
                        if (!n.revealed && n.flagged !== 1) {
                            n.revealed = true;
                            if (n.neighborMines === 0 && !n.isMine) queue.push(n);
                        }
                    });
                }
            }
            return changed;
        };

        let progress = true;
        while(progress) {
            progress = false;

            // 1. Basic Steps
            for(let r=0; r<config.rows; r++) {
                for(let c=0; c<config.cols; c++) {
                    let tile = simGrid[r][c];
                    if(!tile.revealed || tile.neighborMines === 0) continue;

                    let neighbors = getNeighbors(r, c);
                    let flags = neighbors.filter(n => n.flagged === 1).length;
                    let unrevealed = neighbors.filter(n => !n.revealed && n.flagged !== 1);

                    if(unrevealed.length > 0 && unrevealed.length === tile.neighborMines - flags) {
                        unrevealed.forEach(n => {
                            if (n.flagged !== 1) {
                                n.flagged = 1;
                                progress = true;
                            }
                        });
                    }

                    if(unrevealed.length > 0 && flags === tile.neighborMines) {
                        unrevealed.forEach(n => {
                            if (simReveal(n)) progress = true;
                        });
                    }
                }
            }

            if (progress) continue;

            // 2. Advanced Steps
            let activeTiles = [];
            for(let r=0; r<config.rows; r++) {
                for(let c=0; c<config.cols; c++) {
                    let t = simGrid[r][c];
                    if(t.revealed && t.neighborMines > 0) {
                        let neighbors = getNeighbors(r, c);
                        let unrevealed = neighbors.filter(n => !n.revealed && n.flagged !== 1);
                        let flags = neighbors.filter(n => n.flagged === 1).length;
                        
                        if(unrevealed.length > 0) {
                            activeTiles.push({
                                r: r, c: c,
                                eff: t.neighborMines - flags,
                                unrevealed: unrevealed
                            });
                        }
                    }
                }
            }

            for(let i=0; i<activeTiles.length; i++) {
                let A = activeTiles[i];
                for(let j=i+1; j<activeTiles.length; j++) {
                    let B = activeTiles[j];
                    if(Math.abs(A.r - B.r) > 1 || Math.abs(A.c - B.c) > 1) continue;

                    let U_A = A.unrevealed.filter(a => !B.unrevealed.includes(a));
                    let U_B = B.unrevealed.filter(b => !A.unrevealed.includes(b));
                    let diff = A.eff - B.eff;
                    
                    if (diff === U_A.length) {
                        if (U_A.length > 0) U_A.forEach(n => { if(n.flagged !== 1) { n.flagged = 1; progress = true; } });
                        if (U_B.length > 0) U_B.forEach(n => { if (simReveal(n)) progress = true; });
                    } else if (-diff === U_B.length) {
                        if (U_B.length > 0) U_B.forEach(n => { if(n.flagged !== 1) { n.flagged = 1; progress = true; } });
                        if (U_A.length > 0) U_A.forEach(n => { if (simReveal(n)) progress = true; });
                    }
                    if (progress) break;
                }
                if (progress) break;
            }
        }

        let solved = true;
        for(let r=0; r<config.rows; r++) {
            for(let c=0; c<config.cols; c++) {
                if(!simGrid[r][c].isMine && !simGrid[r][c].revealed) {
                    solved = false;
                    break;
                }
            }
            if(!solved) break;
        }

        alert(solved ? "No guessing" : "Needs guessing");
    }

    function changeTexturePack(packName) {
        if (packName === 'custom') {
            document.getElementById('folder-input').click();
            return;
        }

        activeTexturePack = packName;
        
        if (activeTexturePack === 'system') {
            // This mode now uses the SVGs in your texture_default folder
            const path = `images/texture_default/`;
            IMAGES.default = `<img src="${path}default.svg">`;
            IMAGES.flag = `<img src="${path}flag.svg">`;
            IMAGES.question = `<img src="${path}question_mark.svg">`;
            IMAGES.blank = `<img src="${path}blank.svg">`;
            IMAGES.mine_revealed = `<img src="${path}mine_revealed.png" class="mine-anim">`;
            IMAGES.smile = `<img src="${path}smile.png">`;
            IMAGES.dead = `<img src="${path}dead.png">`;
            // Clear custom number images to use text
            for (let i = 1; i <= 24; i++) delete IMAGES[i];
        } else {
            // For 'texture_default' or 'cursed_textures'
            const path = `images/${activeTexturePack}/`;
            
            // Helper to handle mixed extensions (.svg for UI, .png for faces)
            IMAGES.default = `<img src="${path}default.svg">`;
            IMAGES.flag = `<img src="${path}flag.svg">`;
            IMAGES.question = `<img src="${path}question_mark.svg">`;
            IMAGES.blank = `<img src="${path}blank.svg">`;
            IMAGES.mine_revealed = `<img src="${path}mine_revealed.png" class="mine-anim">`;
            IMAGES.smile = `<img src="${path}smile.png">`;
            IMAGES.dead = `<img src="${path}dead.png">`;

            if (activeTexturePack === 'cursed_1') {
                IMAGES.double_flag = `<img src="${path}double_flag.svg">`;
                IMAGES.triple_flag = `<img src="${path}triple_flag.svg">`;
                IMAGES.double_mine = `<img src="${path}double_mine.png" class="mine-anim">`;
                IMAGES.triple_mine = `<img src="${path}triple_mine.png" class="mine-anim">`;
            }
            
            for (let i = 1; i <= 24; i++) {
                // Assuming numbers in subfolders are .svg based on your folder tree
                IMAGES[i] = `<img src="${path}${i}.svg" onerror="this.parentNode.classList.add('n${i}'); this.parentNode.textContent='${i}'">`;
            }
        }

        if (!gameOver) faceBtn.innerHTML = IMAGES.smile;
        
        for (let r = 0; r < config.rows; r++) {
            for (let c = 0; c < config.cols; c++) {
                if (grid[r][c]) updateTileVisuals(grid[r][c]);
            }
        }
    }

    function loadCustomTexturePack(input) {
        if (!input.files || input.files.length === 0) return;

        const files = Array.from(input.files);
        const getFileUrl = (name) => {
            const file = files.find(f => {
                const baseName = f.name.substring(0, f.name.lastIndexOf('.')) || f.name;
                return baseName.toLowerCase() === name.toLowerCase();
            });
            return file ? URL.createObjectURL(file) : null;
        };

        const getImgTag = (name, extraClass = '') => {
            const url = getFileUrl(name);
            return url ? `<img src="${url}" class="${extraClass}">` : null;
        };

        // Reset to default first
        IMAGES.default = '<img src="images/default.svg">';
        IMAGES.flag = '<img src="images/flag.svg">';
        IMAGES.question = '<img src="images/question_mark.svg">';
        IMAGES.blank = '<img src="images/blank.svg">';
        IMAGES.mine_revealed = '<img src="images/mine_revealed.png" class="mine-anim">';
        IMAGES.smile = '<img src="images/smile.png">';
        IMAGES.dead = '<img src="images/dead.png">';

        if (getImgTag('default')) IMAGES.default = getImgTag('default');
        if (getImgTag('flag')) IMAGES.flag = getImgTag('flag');
        if (getImgTag('question_mark')) IMAGES.question = getImgTag('question_mark');
        if (getImgTag('blank')) IMAGES.blank = getImgTag('blank');
        if (getImgTag('mine_revealed')) IMAGES.mine_revealed = getImgTag('mine_revealed', 'mine-anim');
        if (getImgTag('smile')) IMAGES.smile = getImgTag('smile');
        if (getImgTag('dead')) IMAGES.dead = getImgTag('dead');

        for (let i = 1; i <= 8; i++) {
            const tag = getImgTag(i.toString());
            if (tag) IMAGES[i] = tag;
            else delete IMAGES[i];
        }

        activeTexturePack = 'custom';
        if (!gameOver) faceBtn.innerHTML = IMAGES.smile;
        for (let r = 0; r < config.rows; r++) {
            for (let c = 0; c < config.cols; c++) {
                if (grid[r][c]) updateTileVisuals(grid[r][c]);
            }
        }
        input.value = '';
    }

    function updateTileVisuals(tile) {
        tile.el.innerHTML = '';
        tile.el.className = 'tile';

        const xray = document.getElementById('xray-check');
        const forceReveal = xray && xray.checked && hoveredTile && hoveredTile.r === tile.r && hoveredTile.c === tile.c && !tile.revealed;
        
        if (forceReveal) tile.el.style.opacity = '0.5';
        else tile.el.style.opacity = '';
        
        if (gameMode === 'falling' && !tile.active) {
            tile.el.classList.add('empty');
            return;
        }
        
        if (tile.isCleared) {
            tile.el.classList.add('cleared-row');
        }
        
        if (tile.revealed || forceReveal) {
            tile.el.classList.add('revealed');
            
            // Always show blank.svg as the base for revealed tiles
            const blankImg = IMAGES.blank; 
            
            if (tile.isMine) {
                // Layer the mine on top of the blank tile
                let mineImg = IMAGES.mine_revealed;
                if (gameMode === 'cursed_multi_mine') {
                    if (tile.mineCount === 2) mineImg = IMAGES.double_mine;
                    else if (tile.mineCount === 3) mineImg = IMAGES.triple_mine;
                }

                if (tile.revealed || forceReveal) {
                    mineImg = mineImg.replace('mine-anim', '');
                }

                tile.el.innerHTML = blankImg + mineImg;
                // Add a style to stack them if they aren't stacking correctly
                tile.el.style.position = 'relative';
                tile.el.lastElementChild.style.position = 'absolute';
            } else if (tile.neighborMines > 0) {
                if (activeTexturePack === 'system') {
                    tile.el.textContent = tile.neighborMines;
                    tile.el.classList.add(`n${tile.neighborMines}`);
                } else {
                    // Layer the number SVG on top of the blank SVG
                    tile.el.innerHTML = blankImg + (IMAGES[tile.neighborMines] || '');
                    if (tile.el.children.length > 1) {
                        tile.el.style.position = 'relative';
                        tile.el.lastElementChild.style.position = 'absolute';
                    }
                }
            } else {
                tile.el.innerHTML = blankImg;
            }
        } else {
            tile.el.classList.add('hidden');
            if (tile.flagged === 1) {
                // Layer flag on top of default background
                tile.el.innerHTML = IMAGES.default + IMAGES.flag;
                tile.el.style.position = 'relative';
                tile.el.lastElementChild.style.position = 'absolute';
            } else if (tile.flagged === 2 && gameMode === 'cursed_multi_mine') {
                tile.el.innerHTML = IMAGES.default + IMAGES.double_flag;
                tile.el.style.position = 'relative';
                tile.el.lastElementChild.style.position = 'absolute';
            } else if (tile.flagged === 3 && gameMode === 'cursed_multi_mine') {
                tile.el.innerHTML = IMAGES.default + IMAGES.triple_flag;
                tile.el.style.position = 'relative';
                tile.el.lastElementChild.style.position = 'absolute';
            } else if ((tile.flagged === 2 && gameMode !== 'cursed_multi_mine') || (tile.flagged === 4 && gameMode === 'cursed_multi_mine')) {
                // Layer question mark on top of default background
                tile.el.innerHTML = IMAGES.default + IMAGES.question;
                tile.el.style.position = 'relative';
                tile.el.lastElementChild.style.position = 'absolute';
            } else {
                tile.el.innerHTML = IMAGES.default;
            }
        }
    }

    faceBtn.addEventListener('click', () => resetGame());

    // Initialize first game
    startGame('beginner');
</script>
